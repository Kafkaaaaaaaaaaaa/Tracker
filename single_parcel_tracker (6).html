<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Parcel Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4">

    <!-- DEBUG CONSOLE: This will show any hidden errors -->
    <div id="debug-box" class="hidden fixed bottom-4 right-4 bg-red-900 text-white p-4 rounded-lg shadow-xl max-w-sm z-50 text-xs overflow-auto max-h-48 font-mono">
        <h4 class="font-bold border-b border-red-700 pb-1 mb-2">System Error Log</h4>
        <div id="debug-text"></div>
    </div>

    <main class="max-w-2xl mx-auto py-8">
        <div id="admin-panel" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 class="text-lg font-bold mb-4">Admin: Push Update</h2>
            <form id="update-form" class="space-y-4">
                <input type="text" id="new-status" value="In Transit" class="w-full border p-2 rounded" placeholder="Status">
                <input type="text" id="new-location" required class="w-full border p-2 rounded" placeholder="Location">
                <input type="text" id="new-notes" class="w-full border p-2 rounded" placeholder="Notes">
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white py-2 rounded">Publish</button>
            </form>
        </div>

        <div id="timeline-container" class="space-y-4">
            <p class="text-center text-slate-400">Loading...</p>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const JSONBIN_MASTER_KEY = "$2a$10$EWsGL4YWeufRrUGuTxzFhu5TvsuBj6UMp1WfoE1uxJTjJ0RmAyqHq"; 
        const BIN_ID = "6a32e213f5f4af5e2903940f";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
        if (isAdmin) document.getElementById('admin-panel').classList.remove('hidden');

        function logError(msg) {
            const box = document.getElementById('debug-box');
            box.classList.remove('hidden');
            document.getElementById('debug-text').innerText += msg + "\n";
            console.error(msg);
        }

        async function fetchData() {
            try {
                const response = await fetch(`${API_URL}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }
                });
                if (!response.ok) throw new Error(`Fetch failed: ${response.status}`);
                const data = await response.json();
                render(data.record.logs || []);
            } catch (e) {
                logError("Failed to fetch: " + e.message);
            }
        }

        document.getElementById('update-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Saving...";
            
            try {
                // 1. Get current data first (to avoid overwriting existing data)
                const res = await fetch(`${API_URL}/latest`, { headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }});
                const currentData = await res.json();
                const logs = currentData.record.logs || [];
                
                // 2. Add new entry
                logs.push({
                    status: document.getElementById('new-status').value,
                    location: document.getElementById('new-location').value,
                    timestamp: new Date().toLocaleString(),
                    notes: document.getElementById('new-notes').value
                });

                // 3. Put back to server
                const updateRes = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_MASTER_KEY 
                    },
                    body: JSON.stringify({ logs: logs })
                });

                if (!updateRes.ok) {
                    const err = await updateRes.text();
                    throw new Error("Server rejected: " + err);
                }
                
                alert("Success!");
                location.reload();
            } catch (e) {
                logError("Update failed: " + e.message);
                btn.innerText = "Error - Click to retry";
            }
        };

        function render(logs) {
            const container = document.getElementById('timeline-container');
            container.innerHTML = logs.map(l => `
                <div class="bg-white p-4 rounded-lg shadow-sm border">
                    <div class="font-bold">${l.status}</div>
                    <div class="text-sm">${l.location}</div>
                    <div class="text-xs text-gray-400">${l.timestamp}</div>
                </div>
            `).join('');
        }

        fetchData();
    </script>
</body>
</html>
