<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Parcel Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg shadow-indigo-200 shadow-lg">
                    <i data-lucide="package" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Parcel Tracking</h1>
            </div>
            <div id="status-indicator" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-8">
        
        <div id="error-message" class="hidden mb-6 p-4 bg-red-50 border border-red-100 rounded-xl flex items-start gap-3 text-red-700 shadow-sm">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
            <p id="error-text" class="text-sm font-medium"></p>
        </div>

        <div id="admin-panel" class="hidden bg-white rounded-2xl shadow-xl border border-slate-100 p-6 mb-8">
            <div class="flex items-center gap-3 mb-6">
                <div class="p-2 bg-indigo-50 rounded-lg"><i data-lucide="shield-check" class="w-5 h-5 text-indigo-600"></i></div>
                <h2 class="text-lg font-bold text-slate-800">Admin Control</h2>
            </div>
            
            <form id="update-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="new-status" class="w-full rounded-lg border-slate-200 border p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="Parcel Prepared">Parcel Prepared</option>
                        <option value="In Transit" selected>In Transit</option>
                        <option value="Arrived at Facility">Arrived at Facility</option>
                        <option value="Out for Delivery">Out for Delivery</option>
                        <option value="Delivered">Delivered</option>
                    </select>
                    <input type="text" id="new-location" required placeholder="Current Location" class="w-full rounded-lg border-slate-200 border p-3 outline-none" />
                </div>
                <input type="text" id="new-notes" placeholder="Additional notes..." class="w-full rounded-lg border-slate-200 border p-3 outline-none" />
                <button type="submit" id="submit-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 rounded-lg transition-all shadow-md">Publish Update</button>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
            <div id="timeline-container" class="space-y-6">
                <div class="text-center py-12 text-slate-400">Loading tracking journey...</div>
            </div>
        </div>
    </main>

    <script>
        const JSONBIN_MASTER_KEY = "$2a$10$EWsGL4YWeufRrUGuTxzFhu5TvsuBj6UMp1WfoE1uxJTjJ0RmAyqHq"; 
        const BIN_ID = "6a32e213f5f4af5e2903940f";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'true') {
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL, {
                    headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }
                });
                if (!response.ok) throw new Error("Connection Error");
                const data = await response.json();
                render(data.record.logs || []);
            } catch (e) {
                document.getElementById('error-text').innerText = "Unable to connect: " + e.message;
                document.getElementById('error-message').classList.remove('hidden');
            }
        }

        document.getElementById('update-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Updating...";
            
            try {
                const res = await fetch(API_URL, { headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }});
                const currentData = await res.json();
                const logs = currentData.record.logs || [];
                
                logs.push({
                    status: document.getElementById('new-status').value,
                    location: document.getElementById('new-location').value,
                    timestamp: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString(),
                    notes: document.getElementById('new-notes').value
                });

                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
                    body: JSON.stringify({ logs: logs })
                });
                
                window.location.reload();
            } catch (e) {
                alert("Failed: " + e.message);
            }
        };

        function render(logs) {
            const container = document.getElementById('timeline-container');
            if(logs.length === 0) container.innerHTML = "<p class='text-center text-slate-400'>No updates yet.</p>";
            else container.innerHTML = logs.reverse().map(l => `
                <div class="relative pl-8 border-l-2 border-indigo-100 pb-8 last:pb-0">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-indigo-600 border-4 border-white shadow-sm"></div>
                    <div class="font-bold text-slate-900">${l.status}</div>
                    <div class="text-sm text-indigo-600 font-medium">${l.location}</div>
                    <div class="text-xs text-slate-400 mt-1">${l.timestamp}</div>
                    ${l.notes ? `<div class="mt-2 text-sm text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-100">${l.notes}</div>` : ''}
                </div>
            `).join('');
        }

        fetchData();
        lucide.createIcons();
    </script>
</body>
</html>
