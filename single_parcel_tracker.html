<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Parcel Tracker</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide for Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-blue-200 min-h-screen">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div id="status-indicator" class="bg-blue-600 p-2 rounded-lg transition-colors">
                    <i data-lucide="map-pin" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Live Tracker</h1>
            </div>
            
            <!-- The admin toggle button has been removed so customers cannot see it -->
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div id="error-message" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl flex items-center gap-3 text-red-700">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
            <p id="error-text" class="text-sm font-medium"></p>
            <button onclick="document.getElementById('error-message').classList.add('hidden')" class="ml-auto text-red-400 hover:text-red-700">&times;</button>
        </div>

        <div id="admin-panel" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 transition-all">
            <div class="flex items-center gap-2 mb-4 pb-4 border-b border-slate-100">
                <i data-lucide="shield-check" class="w-5 h-5 text-amber-600"></i>
                <h2 class="text-lg font-semibold text-slate-800">Push Update from Tracker</h2>
            </div>
            
            <form id="update-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Status</label>
                        <select id="new-status" class="w-full rounded-xl border-slate-300 bg-slate-50 border p-3 text-slate-700 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all">
                            <option value="Parcel Prepared">Parcel Prepared</option>
                            <option value="In Transit" selected>In Transit</option>
                            <option value="Arrived at Facility">Arrived at Facility</option>
                            <option value="Out for Delivery">Out for Delivery</option>
                            <option value="Delivered">Delivered</option>
                            <option value="Exception/Delay">Exception / Delay</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Current Location</label>
                        <input type="text" id="new-location" required placeholder="e.g., Chicago Sorting Hub" class="w-full rounded-xl border-slate-300 bg-slate-50 border p-3 text-slate-700 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all" />
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Internal Notes (Visible to customer)</label>
                    <input type="text" id="new-notes" placeholder="e.g., Tracker pinged successfully. Moving to next city." class="w-full rounded-xl border-slate-300 bg-slate-50 border p-3 text-slate-700 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all" />
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-medium py-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    Publish Location Update
                </button>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
            <div class="mb-8 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Tracking Journey</h2>
                    <p class="text-slate-500 text-sm">Real-time cloud updates from the physical tracker.</p>
                </div>
                <div id="loading-indicator" class="flex items-center gap-2 text-blue-600 text-sm font-medium">
                    <div class="w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    Syncing...
                </div>
            </div>

            <div class="relative">
                <div id="vertical-line" class="absolute left-6 top-0 bottom-0 w-0.5 bg-slate-200 -ml-px hidden"></div>
                <div id="timeline-container" class="space-y-8">
                    <!-- Timeline items will be injected here by Javascript -->
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. ADD YOUR FIREBASE CONFIG HERE LATER
        // ==========================================
        let firebaseConfig = {
            // apiKey: "YOUR_API_KEY",
            // authDomain: "YOUR_PROJECT.firebaseapp.com",
            // projectId: "YOUR_PROJECT",
            // ...
        };

        // Fallback for this specific preview environment to work out of the box
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-parcel-tracker';

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State Variables
        let user = null;
        // Secretly check the URL to see if YOU are accessing it as the admin
        const urlParams = new URLSearchParams(window.location.search);
        let isAdmin = urlParams.get('admin') === 'true';
        let trackingLogs = [];

        // DOM Elements
        const adminPanel = document.getElementById('admin-panel');
        const timelineContainer = document.getElementById('timeline-container');
        const updateForm = document.getElementById('update-form');
        const loadingIndicator = document.getElementById('loading-indicator');
        const verticalLine = document.getElementById('vertical-line');
        const statusIndicator = document.getElementById('status-indicator');

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                showError("Authentication failed. " + error.message);
            }
        }

        onAuthStateChanged(auth, (currentUser) => {
            user = currentUser;
            if (user) {
                loadTrackingData();
            }
        });

        function loadTrackingData() {
            const trackerCollection = collection(db, 'artifacts', appId, 'public', 'data', 'tracking_logs');
            
            onSnapshot(trackerCollection, (snapshot) => {
                trackingLogs = [];
                snapshot.forEach((doc) => {
                    trackingLogs.push({ id: doc.id, ...doc.data() });
                });
                
                // Sort by timestamp (newest first)
                trackingLogs.sort((a, b) => b.timestampMs - a.timestampMs);
                
                loadingIndicator.style.display = 'none';
                statusIndicator.classList.remove('bg-slate-400', 'animate-pulse');
                
                renderTimeline();
            }, (error) => {
                showError("Lost connection to live database.");
                loadingIndicator.style.display = 'none';
            });
        }

        updateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!user) {
                showError("Not connected to database yet.");
                return;
            }

            const status = document.getElementById('new-status').value;
            const location = document.getElementById('new-location').value;
            const notes = document.getElementById('new-notes').value;
            const submitBtn = document.getElementById('submit-btn');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Saving...';
            lucide.createIcons();

            try {
                const trackerCollection = collection(db, 'artifacts', appId, 'public', 'data', 'tracking_logs');
                await addDoc(trackerCollection, {
                    status: status,
                    location: location,
                    timestamp: new Date().toLocaleString(),
                    timestampMs: Date.now(),
                    notes: notes,
                    icon: getIconForStatus(status)
                });
                
                // Reset form
                document.getElementById('new-location').value = '';
                document.getElementById('new-notes').value = '';
            } catch (err) {
                showError("Failed to push update. " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i data-lucide="plus" class="w-5 h-5"></i> Publish Location Update';
                lucide.createIcons();
            }
        });

        function renderTimeline() {
            timelineContainer.innerHTML = '';
            
            if (trackingLogs.length === 0) {
                verticalLine.classList.add('hidden');
                timelineContainer.innerHTML = `
                    <div class="text-center py-12 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                        <i data-lucide="package" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                        <p class="text-slate-500 font-medium">Waiting for first tracker ping...</p>
                        <p class="text-slate-400 text-sm mt-1">Switch to Admin View to add a location.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            verticalLine.classList.remove('hidden');

            trackingLogs.forEach((step, index) => {
                const isFirst = index === 0;
                const iconColor = getIconColor(step.status);
                const titleColor = isFirst ? 'text-blue-600' : 'text-slate-800';
                
                const deleteBtnHtml = isAdmin ? `
                    <button onclick="window.deleteLog('${step.id}')" class="text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100" title="Delete">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                ` : '';

                const notesHtml = step.notes ? `
                    <p class="text-slate-500 text-sm leading-relaxed max-w-lg bg-slate-50 p-3 rounded-lg border border-slate-100">
                        ${step.notes}
                    </p>
                ` : '';

                const itemHtml = `
                    <div class="relative flex items-start gap-6 group">
                        <div class="relative z-10 flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center shadow-sm border-4 border-white ${iconColor}">
                            <i data-lucide="${step.icon}" class="w-6 h-6 text-white"></i>
                        </div>
                        
                        <div class="pt-1 pb-2 flex-1">
                            <div class="flex flex-col sm:flex-row sm:items-baseline justify-between gap-2 mb-1">
                                <div class="flex flex-col sm:flex-row sm:items-baseline gap-1 sm:gap-3">
                                    <h3 class="text-lg font-bold ${titleColor}">${step.status}</h3>
                                    <span class="text-xs font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full w-fit">
                                        ${step.timestamp}
                                    </span>
                                </div>
                                ${deleteBtnHtml}
                            </div>
                            
                            <div class="flex items-center gap-1.5 text-slate-600 font-medium mb-2">
                                <i data-lucide="map-pin" class="w-4 h-4"></i>
                                ${step.location}
                            </div>
                            
                            ${notesHtml}
                        </div>
                    </div>
                `;
                timelineContainer.innerHTML += itemHtml;
            });
            
            // Re-initialize icons for newly added HTML
            lucide.createIcons();
        }

        window.deleteLog = async function(id) {
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tracking_logs', id));
            } catch (err) {
                showError("Failed to delete log.");
            }
        };

        function getIconForStatus(status) {
            switch (status) {
                case 'Delivered': return 'check-circle';
                case 'Out for Delivery': return 'navigation';
                case 'In Transit': return 'truck';
                case 'Exception/Delay': return 'clock';
                case 'Parcel Prepared': return 'package';
                default: return 'map-pin';
            }
        }

        function getIconColor(status) {
            if (status === 'Delivered') return 'bg-green-500';
            if (status === 'Exception/Delay') return 'bg-red-500';
            return 'bg-blue-600';
        }

        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('error-message').classList.remove('hidden');
        }

        // Initialize Everything
        if (isAdmin) {
            // Show the backend update form only if the secret URL is used
            adminPanel.classList.remove('hidden');
        }
        
        lucide.createIcons();
        initAuth();

    </script>
</body>
</html>
