<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Parcel Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-slate-900">Live Tracker</h1>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Debug Console -->
        <div id="debug-box" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
            <strong>Error:</strong> <span id="debug-text"></span>
        </div>

        <div id="admin-panel" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 class="text-lg font-bold mb-4">Admin: Push Update</h2>
            <form id="update-form" class="space-y-4">
                <input type="text" id="new-status" value="In Transit" class="w-full border p-2 rounded" placeholder="Status">
                <input type="text" id="new-location" required class="w-full border p-2 rounded" placeholder="Location">
                <input type="text" id="new-notes" class="w-full border p-2 rounded" placeholder="Notes">
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white py-2 rounded">Publish</button>
            </form>
        </div>

        <div id="timeline-container" class="space-y-4">
            <p class="text-center text-slate-400">Loading...</p>
        </div>
    </main>

    <script>
        // CONFIGURATION
        const JSONBIN_MASTER_KEY = "$2a$10$EWsGL4YWeufRrUGuTxzFhu5TvsuBj6UMp1WfoE1uxJTjJ0RmAyqHq"; 
        const BIN_ID = "6a32e213f5f4af5e2903940f";
        // CRITICAL FIX: Ensure this is api.jsonbin.io/v3/b/
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'true') {
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        function logError(msg) {
            const box = document.getElementById('debug-box');
            box.classList.remove('hidden');
            document.getElementById('debug-text').innerText = msg;
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL, {
                    headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }
                });
                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                const data = await response.json();
                render(data.record.logs || []);
            } catch (e) {
                logError("Failed to fetch: " + e.message);
            }
        }

        document.getElementById('update-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Saving...";
            
            try {
                // 1. Get current data
                const res = await fetch(API_URL, { headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }});
                const currentData = await res.json();
                const logs = currentData.record.logs || [];
                
                // 2. Add entry
                logs.push({
                    status: document.getElementById('new-status').value,
                    location: document.getElementById('new-location').value,
                    timestamp: new Date().toLocaleString(),
                    notes: document.getElementById('new-notes').value
                });

                // 3. Update data
                const updateRes = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_MASTER_KEY 
                    },
                    body: JSON.stringify({ logs: logs })
                });

                if (!updateRes.ok) throw new Error("Update failed: " + updateRes.status);
                
                location.reload();
            } catch (e) {
                logError("Update failed: " + e.message);
                btn.innerText = "Retry";
            }
        };

        function render(logs) {
            const container = document.getElementById('timeline-container');
            if(logs.length === 0) container.innerHTML = "<p class='text-center'>No updates yet.</p>";
            else container.innerHTML = logs.reverse().map(l => `
                <div class="bg-white p-4 rounded-lg shadow-sm border">
                    <div class="font-bold">${l.status}</div>
                    <div class="text-sm">${l.location}</div>
                    <div class="text-xs text-gray-400">${l.timestamp}</div>
                    <div class="text-xs text-gray-600 mt-1">${l.notes}</div>
                </div>
            `).join('');
        }

        fetchData();
        lucide.createIcons();
    </script>
</body>
</html>
