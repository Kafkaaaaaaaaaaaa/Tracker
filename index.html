<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Parcel Tracker</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide for Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-blue-200 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="status-indicator" class="bg-blue-600 p-2.5 rounded-xl shadow-inner transition-colors duration-300">
                    <i data-lucide="package" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight leading-tight">Live Tracker</h1>
                    <p class="text-xs text-slate-500 font-medium">Real-time status</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Error Message Container -->
        <div id="error-message" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl flex items-start gap-3 text-red-700 shadow-sm animate-fade-in">
            <i data-lucide="alert-triangle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
            <div class="flex-grow">
                <h3 class="font-bold text-sm mb-1">Configuration Required</h3>
                <p id="error-text" class="text-sm leading-relaxed"></p>
            </div>
            <button onclick="document.getElementById('error-message').classList.add('hidden')" class="ml-auto text-red-400 hover:text-red-700 transition-colors">&times;</button>
        </div>

        <!-- Admin Panel (Visible with ?admin=true) -->
        <div id="admin-panel" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 transition-all">
            <div class="flex items-center justify-between mb-4 pb-4 border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div class="bg-amber-100 p-1.5 rounded-lg">
                        <i data-lucide="shield-alert" class="w-5 h-5 text-amber-700"></i>
                    </div>
                    <h2 class="text-lg font-bold text-slate-800">Courier Backend</h2>
                </div>
                <span class="text-xs font-semibold bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full uppercase tracking-wider">Admin Mode</span>
            </div>
            
            <form id="update-form" class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Current Status</label>
                        <div class="relative">
                            <select id="new-status" class="w-full appearance-none rounded-xl border-slate-300 bg-slate-50 border p-3.5 text-slate-700 font-medium focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all shadow-sm">
                                <option value="Parcel Prepared">📦 Parcel Prepared</option>
                                <option value="In Transit" selected>🚚 In Transit</option>
                                <option value="Arrived at Facility">🏢 Arrived at Facility</option>
                                <option value="Out for Delivery">📍 Out for Delivery</option>
                                <option value="Delivered">✅ Delivered</option>
                                <option value="Exception/Delay">⚠️ Exception / Delay</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                                <i data-lucide="chevron-down" class="w-4 h-4"></i>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Physical Location</label>
                        <input type="text" id="new-location" required placeholder="e.g., London Sorting Centre" class="w-full rounded-xl border-slate-300 bg-slate-50 border p-3.5 text-slate-700 font-medium focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all shadow-sm placeholder:text-slate-400 placeholder:font-normal" />
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Public Notes (Optional)</label>
                    <input type="text" id="new-notes" placeholder="e.g., Cleared customs, moving to final delivery depot." class="w-full rounded-xl border-slate-300 bg-slate-50 border p-3.5 text-slate-700 focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none transition-all shadow-sm placeholder:text-slate-400" />
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md hover:shadow-lg active:scale-[0.98]">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    <span>Push Location to Tracking Page</span>
                </button>
            </form>
        </div>

        <!-- Customer Timeline -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8 relative overflow-hidden">
            <!-- Decorative background element -->
            <div class="absolute top-0 right-0 -mt-16 -mr-16 w-48 h-48 bg-slate-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>

            <div class="mb-8 flex justify-between items-end relative z-10">
                <div>
                    <h2 class="text-2xl font-black text-slate-900 mb-1 tracking-tight">Journey Log</h2>
                    <p class="text-slate-500 text-sm font-medium">Tracking history updated securely.</p>
                </div>
                <div id="loading-indicator" class="flex items-center gap-2 text-slate-500 text-sm font-semibold bg-slate-100 px-3 py-1.5 rounded-full">
                    <i data-lucide="refresh-cw" class="w-4 h-4 animate-spin text-blue-600"></i>
                    Connecting...
                </div>
            </div>

            <div class="relative z-10">
                <!-- Main Vertical Timeline Line -->
                <div id="vertical-line" class="absolute left-6 top-6 bottom-6 w-0.5 bg-slate-200 hidden"></div>
                
                <div id="timeline-container" class="space-y-8">
                    <!-- Javascript injects steps here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Simple Footer -->
    <footer class="mt-auto py-6 text-center text-slate-400 text-xs font-medium border-t border-slate-200 bg-slate-50">
        Secure Parcel Tracking System
    </footer>

    <script>
        // --- STREAMING_CHUNK:Initializing Configuration & State ---
        // ==========================================
        // CONFIGURATION: JSONBIN.IO (No Firebase required)
        // ==========================================
        const JSONBIN_MASTER_KEY = "$2a$10$EWsGL4YWeufRrUGuTxzFhu5TvsuBj6UMp1WfoE1uxJTjJ0RmAyqHq"; 
        const BIN_ID = "6a32e213f5f4af5e2903940f"; 
        // --- End Configuration ---

        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID.trim()}`;
        
        // DOM Elements
        const adminPanel = document.getElementById('admin-panel');
        const timelineContainer = document.getElementById('timeline-container');
        const updateForm = document.getElementById('update-form');
        const loadingIndicator = document.getElementById('loading-indicator');
        const verticalLine = document.getElementById('vertical-line');
        const statusIndicator = document.getElementById('status-indicator');

        // State
        let trackingLogs = [];
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'true';

        // --- STREAMING_CHUNK:Defining Utility Functions ---
        
        function showError(msg) {
            document.getElementById('error-text').innerHTML = msg;
            document.getElementById('error-message').classList.remove('hidden');
        }

        function getIconForStatus(status) {
            const s = status.replace(/[^a-zA-Z]/g, '').toLowerCase(); // Clean up emojis if present
            if (s.includes('delivered')) return 'check-circle-2';
            if (s.includes('outfordelivery')) return 'map-pin';
            if (s.includes('intransit')) return 'truck';
            if (s.includes('exception') || s.includes('delay')) return 'alert-circle';
            if (s.includes('prepared')) return 'package-check';
            return 'map-pin';
        }

        function getIconColor(status) {
            const s = status.replace(/[^a-zA-Z]/g, '').toLowerCase();
            if (s.includes('delivered')) return 'bg-emerald-500 border-emerald-100 shadow-emerald-200';
            if (s.includes('exception') || s.includes('delay')) return 'bg-red-500 border-red-100 shadow-red-200';
            return 'bg-blue-600 border-blue-100 shadow-blue-200';
        }

        // --- STREAMING_CHUNK:Loading Data from JSONBin ---

        async function fetchTrackingData() {
            if (JSONBIN_MASTER_KEY === "YOUR_JSONBIN_MASTER_KEY") {
                loadingIndicator.style.display = 'none';
                showError("API Keys are missing. Please configure JSONBin to start tracking.");
                return;
            }

            try {
                // Added cache-busting so phones/browsers NEVER show outdated information
                const response = await fetch(API_URL + '/latest?nocache=' + new Date().getTime(), {
                    cache: 'no-store',
                    headers: {
                        'X-Master-Key': JSONBIN_MASTER_KEY.trim(),
                        'X-Bin-Meta': 'false',
                        'Cache-Control': 'no-cache'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const data = await response.json();
                
                // Foolproof check to find the data no matter how JSONBin formats it
                if (Array.isArray(data)) {
                    trackingLogs = data;
                } else if (data && Array.isArray(data.logs)) {
                    trackingLogs = data.logs;
                } else if (data && data.record && Array.isArray(data.record.logs)) {
                    trackingLogs = data.record.logs;
                } else if (data && data.record && Array.isArray(data.record)) {
                    trackingLogs = data.record;
                } else {
                    trackingLogs = [];
                }

                // Sort newest first
                trackingLogs.sort((a, b) => b.timestampMs - a.timestampMs);
                
                renderTimeline();
                
                loadingIndicator.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-emerald-500"></i> Sync Complete`;
                setTimeout(() => { loadingIndicator.style.display = 'none'; }, 2000);

            } catch (error) {
                console.error(error);
                loadingIndicator.style.display = 'none';
                showError("Failed to fetch data. Make sure your Bin ID and Master Key are correct.");
            }
        }

        // --- STREAMING_CHUNK:Handling Form Submission ---

        updateForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const rawStatus = document.getElementById('new-status').value;
            // Removed complex emoji regex that crashes some older mobile browsers
            const cleanStatus = rawStatus.trim(); 
            
            const location = document.getElementById('new-location').value;
            const notes = document.getElementById('new-notes').value;
            const submitBtn = document.getElementById('submit-btn');
            const btnText = submitBtn.querySelector('span');
            const btnIcon = submitBtn.querySelector('i');

            // UI Loading state
            submitBtn.disabled = true;
            btnIcon.setAttribute('data-lucide', 'loader-2');
            btnIcon.classList.add('animate-spin');
            btnText.innerText = 'Encrypting & Saving...';
            lucide.createIcons();

            const newLog = {
                id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(), // Simple unique ID
                status: cleanStatus,
                location: location,
                timestamp: new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                timestampMs: Date.now(),
                notes: notes,
                icon: getIconForStatus(cleanStatus)
            };

            // Add to our local array
            trackingLogs.push(newLog);

            try {
                // Save the entire array back to JSONBin
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_MASTER_KEY.trim(),
                        'X-Bin-Versioning': 'false'
                    },
                    body: JSON.stringify({ logs: trackingLogs })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error("Cloud rejected the save: " + errText);
                }

                // Success
                document.getElementById('new-location').value = '';
                document.getElementById('new-notes').value = '';
                
                // Re-sort and render
                trackingLogs.sort((a, b) => b.timestampMs - a.timestampMs);
                renderTimeline();

            } catch (err) {
                showError("Failed to push update: " + err.message);
                // Revert local array if save failed
                trackingLogs = trackingLogs.filter(log => log.id !== newLog.id); 
            } finally {
                // Reset UI
                submitBtn.disabled = false;
                btnIcon.setAttribute('data-lucide', 'send');
                btnIcon.classList.remove('animate-spin');
                btnText.innerText = 'Push Location to Tracking Page';
                lucide.createIcons();
            }
        });

        // --- STREAMING_CHUNK:Rendering the Timeline UI ---

        function renderTimeline() {
            timelineContainer.innerHTML = '';
            
            if (trackingLogs.length === 0) {
                verticalLine.classList.add('hidden');
                timelineContainer.innerHTML = `
                    <div class="text-center py-16 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                        <div class="bg-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border border-slate-100">
                            <i data-lucide="box" class="w-8 h-8 text-slate-300"></i>
                        </div>
                        <h3 class="text-slate-700 font-bold mb-1">Awaiting Tracker Data</h3>
                        <p class="text-slate-500 text-sm max-w-sm mx-auto">The tracking history will appear here once the physical device transmits its first location ping.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            verticalLine.classList.remove('hidden');

            trackingLogs.forEach((step, index) => {
                const isFirst = index === 0; // Most recent step
                const styling = getIconColor(step.status);
                
                // Emphasize the newest step
                const titleClass = isFirst ? 'text-slate-900 text-xl font-bold' : 'text-slate-700 text-lg font-semibold';
                const nodeSizeClass = isFirst ? 'w-14 h-14 border-[4px] shadow-lg' : 'w-10 h-10 border-2 shadow-sm ml-2';
                const iconSizeClass = isFirst ? 'w-6 h-6' : 'w-5 h-5';
                
                // Update the header icon to match current status
                if (isFirst) {
                    const headerIcon = document.querySelector('#status-indicator i');
                    headerIcon.setAttribute('data-lucide', step.icon);
                    document.getElementById('status-indicator').className = `p-2.5 rounded-xl shadow-inner transition-colors duration-300 ${styling.split(' ')[0]}`;
                }

                const deleteBtnHtml = isAdmin ? `
                    <button onclick="window.deleteLog('${step.id}')" class="text-slate-300 hover:text-red-500 p-1.5 rounded-md hover:bg-red-50 transition-colors ml-auto tooltip-trigger" title="Delete record">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                ` : '';

                const notesHtml = step.notes ? `
                    <div class="mt-3 bg-slate-50 p-3.5 rounded-xl border border-slate-100 text-slate-600 text-sm leading-relaxed max-w-xl">
                        <i data-lucide="info" class="w-4 h-4 inline-block mr-1 text-slate-400 -mt-0.5"></i>
                        ${step.notes}
                    </div>
                ` : '';

                const itemHtml = `
                    <div class="relative flex items-start gap-5 sm:gap-8 group opacity-0 animate-[fade-in-up_0.5s_ease-out_forwards]" style="animation-delay: ${index * 0.1}s">
                        
                        <!-- The Node -->
                        <div class="relative z-10 flex-shrink-0 flex items-center justify-center rounded-full bg-white transition-all duration-300 ${nodeSizeClass} ${styling}">
                            <i data-lucide="${step.icon}" class="text-white ${iconSizeClass}"></i>
                        </div>
                        
                        <!-- Content -->
                        <div class="pt-1 pb-4 flex-1 min-w-0">
                            <div class="flex flex-wrap items-baseline gap-2 sm:gap-3 mb-1.5">
                                <h3 class="${titleClass} tracking-tight">${step.status}</h3>
                                <span class="text-xs font-semibold text-slate-500 bg-slate-100 px-2.5 py-1 rounded-md tracking-wide">
                                    ${step.timestamp}
                                </span>
                                ${deleteBtnHtml}
                            </div>
                            
                            <div class="flex items-center gap-2 text-slate-600 font-medium">
                                <i data-lucide="map-pin" class="w-4 h-4 text-blue-500"></i>
                                <span class="truncate">${step.location}</span>
                            </div>
                            
                            ${notesHtml}
                        </div>
                    </div>
                `;
                timelineContainer.innerHTML += itemHtml;
            });
            
            lucide.createIcons();
        }

        // --- STREAMING_CHUNK:Handling Deletions (Admin Only) ---

        window.deleteLog = async function(id) {
            // Simplified custom modal instead of alert/confirm to follow strict rules
            if (document.getElementById('delete-modal')) {
                document.getElementById('delete-modal').remove();
            }

            const modalHtml = `
                <div id="delete-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-fade-in">
                    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full mx-4">
                        <h3 class="text-lg font-bold text-slate-900 mb-2">Delete Record?</h3>
                        <p class="text-slate-500 text-sm mb-6">This will permanently remove this location ping from the tracker.</p>
                        <div class="flex justify-end gap-3">
                            <button onclick="document.getElementById('delete-modal').remove()" class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                            <button onclick="confirmDelete('${id}')" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        };

        window.confirmDelete = async function(id) {
            document.getElementById('delete-modal').remove();
            
            // Filter out the deleted log
            const originalLogs = [...trackingLogs];
            trackingLogs = trackingLogs.filter(log => log.id !== id);
            
            // Optimistic UI update
            renderTimeline();

            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_MASTER_KEY.trim(),
                        'X-Bin-Versioning': 'false'
                    },
                    body: JSON.stringify({ logs: trackingLogs })
                });

                if (!response.ok) throw new Error("Deletion sync failed");
                
            } catch (err) {
                showError("Failed to delete log.");
                // Revert UI if save failed
                trackingLogs = originalLogs;
                renderTimeline();
            }
        };

        // --- STREAMING_CHUNK:Initialization ---

        // Custom Tailwind animations via style tag for simplicity
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fade-in-up {
                0% { opacity: 0; transform: translateY(10px); }
                100% { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in { animation: fade-in-up 0.3s ease-out forwards; }
        `;
        document.head.appendChild(style);

        // Run startup logic
        if (isAdmin) {
            adminPanel.classList.remove('hidden');
        }
        
        lucide.createIcons();
        fetchTrackingData();

    </script>
</body>
</html>
